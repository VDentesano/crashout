name: Crashout INSFORGE Smoke

on:
  workflow_dispatch:
    inputs:
      events_url:
        description: "INSFORGE events endpoint ending in /events"
        required: false
        default: "https://2zzc6u78.functions.insforge.app/events"
      allow_shared_backend:
        description: "Set true to acknowledge durable synthetic rows on the shared default backend"
        required: false
        default: "false"

concurrency:
  group: crashout-insforge-smoke
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  insforge-smoke:
    name: INSFORGE persistence smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/crashout
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
          cache: true
          cache_dependency_path: projects/crashout/pnpm-lock.yaml
          package_json_file: projects/crashout/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run INSFORGE persistence smoke
        env:
          INSFORGE_EVENTS_URL: ${{ inputs.events_url }}
          INSFORGE_SMOKE_ALLOW_SHARED_BACKEND: ${{ inputs.allow_shared_backend }}
        run: pnpm run smoke:insforge

      - name: Upload INSFORGE smoke evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: insforge-persistence-smoke
          path: docs/qa/insforge-persistence-smoke/
          if-no-files-found: warn
          retention-days: 14
