name: Crashout CI

on:
  workflow_dispatch:
    inputs:
      run_insforge_event_smoke:
        description: "Run the INSFORGE event SQL readback smoke and upload evidence"
        required: true
        type: boolean
        default: true
      run_insforge_balance_smoke:
        description: "Run the INSFORGE balance reconciliation smoke and upload evidence"
        required: true
        type: boolean
        default: false
      insforge_events_url:
        description: "INSFORGE /events endpoint"
        required: false
        type: string
        default: "https://2zzc6u78.functions.insforge.app/events"
      insforge_balance_url:
        description: "INSFORGE /balance endpoint"
        required: false
        type: string
        default: "https://2zzc6u78.functions.insforge.app/balance"
  pull_request:
    paths:
      - ".github/workflows/crashout-ci.yml"
      - "memories/consensus.md"
      - "projects/crashout/**"
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/crashout-ci.yml"
      - "memories/consensus.md"
      - "projects/crashout/**"

concurrency:
  group: crashout-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    name: Lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/crashout
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.1
          cache: true
          cache_dependency_path: projects/crashout/pnpm-lock.yaml
          package_json_file: projects/crashout/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release gate
        run: pnpm run check

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run cockpit smoke
        run: pnpm run smoke:cockpit:ci

      - name: Upload cockpit smoke artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: cockpit-smoke
          path: docs/qa/cockpit-smoke/
          retention-days: 14

      - name: Check INSFORGE smoke credentials
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_insforge_event_smoke == true || inputs.run_insforge_balance_smoke == true) }}
        env:
          INSFORGE_ACCESS_TOKEN: ${{ secrets.INSFORGE_ACCESS_TOKEN }}
          INSFORGE_CREDENTIALS_CONFIG: ${{ secrets.INSFORGE_CREDENTIALS_CONFIG }}
          INSFORGE_PROJECT_ID: ${{ secrets.INSFORGE_PROJECT_ID }}
          INSFORGE_PROJECT_CONFIG: ${{ secrets.INSFORGE_PROJECT_CONFIG }}
        run: |
          test -n "$INSFORGE_CREDENTIALS_CONFIG"
          test -n "$INSFORGE_PROJECT_CONFIG"

      - name: Run INSFORGE event readback smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_insforge_event_smoke == true }}
        env:
          INSFORGE_ACCESS_TOKEN: ${{ secrets.INSFORGE_ACCESS_TOKEN }}
          INSFORGE_CREDENTIALS_CONFIG: ${{ secrets.INSFORGE_CREDENTIALS_CONFIG }}
          INSFORGE_PROJECT_ID: ${{ secrets.INSFORGE_PROJECT_ID }}
          INSFORGE_PROJECT_CONFIG: ${{ secrets.INSFORGE_PROJECT_CONFIG }}
          INSFORGE_EVENTS_URL: ${{ inputs.insforge_events_url }}
          SMOKE_CYCLE: "107"
          SMOKE_OUT_DIR: ../../docs/qa/insforge-event-readback-smoke
        run: pnpm run smoke:insforge:event

      - name: Upload INSFORGE event readback artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && !cancelled() && inputs.run_insforge_event_smoke == true }}
        uses: actions/upload-artifact@v7
        with:
          name: insforge-event-readback-smoke
          path: docs/qa/insforge-event-readback-smoke/
          retention-days: 14

      - name: Run INSFORGE balance reconciliation smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_insforge_balance_smoke == true }}
        env:
          INSFORGE_ACCESS_TOKEN: ${{ secrets.INSFORGE_ACCESS_TOKEN }}
          INSFORGE_CREDENTIALS_CONFIG: ${{ secrets.INSFORGE_CREDENTIALS_CONFIG }}
          INSFORGE_PROJECT_ID: ${{ secrets.INSFORGE_PROJECT_ID }}
          INSFORGE_PROJECT_CONFIG: ${{ secrets.INSFORGE_PROJECT_CONFIG }}
          INSFORGE_BALANCE_URL: ${{ inputs.insforge_balance_url }}
          SMOKE_CYCLE: "107"
          SMOKE_OUT_DIR: ../../docs/qa/insforge-balance-reconciliation-smoke
        run: pnpm run smoke:insforge:balance

      - name: Upload INSFORGE balance reconciliation artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && !cancelled() && inputs.run_insforge_balance_smoke == true }}
        uses: actions/upload-artifact@v7
        with:
          name: insforge-balance-reconciliation-smoke
          path: docs/qa/insforge-balance-reconciliation-smoke/
          retention-days: 14
