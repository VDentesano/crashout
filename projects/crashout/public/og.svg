<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0C12"/>
      <stop offset="1" stop-color="#070709"/>
    </linearGradient>
    <linearGradient id="volt" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#00FF85"/>
      <stop offset="0.7" stop-color="#00FF85"/>
      <stop offset="1" stop-color="#FFD23F"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#171722" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- rising crash curve -> crash dot (brand motif) -->
  <path d="M70 540 C 360 530, 560 470, 760 300 S 980 110, 1090 120"
        fill="none" stroke="url(#volt)" stroke-width="9"
        stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="1090" cy="120" r="16" fill="#FF3B30" filter="url(#glow)"/>
  <circle cx="1090" cy="120" r="30" fill="none" stroke="#FF3B30" stroke-width="3" opacity="0.5"/>

  <!-- live multiplier callout riding the curve -->
  <text x="690" y="270" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace"
        font-size="62" font-weight="800" fill="#FFD23F">2.47×</text>

  <!-- kicker -->
  <text x="74" y="150" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace"
        font-size="26" font-weight="700" letter-spacing="8" fill="#32D6FF">1V1 CRASH DUEL · PROVABLY FAIR</text>

  <!-- wordmark -->
  <text x="70" y="300" font-family="'Chakra Petch','DejaVu Sans',sans-serif"
        font-size="150" font-weight="800" letter-spacing="2" fill="#00FF85">CRASHOUT</text>

  <!-- tagline -->
  <text x="74" y="385" font-family="'Chakra Petch','DejaVu Sans',sans-serif"
        font-size="46" font-weight="700" fill="#F4F4F6">Cash out. Or crash out.</text>

  <!-- url chip -->
  <rect x="74" y="540" width="290" height="44" rx="8" fill="#11131A" stroke="#262A36"/>
  <text x="92" y="570" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace"
        font-size="22" font-weight="700" fill="#9AA0B4">crashout-euq.pages.dev</text>
</svg>
